<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <script src="js/vue.js"></script>
    <script src="/js/axios-0.18.0.js"></script>
    <style>
        #portal-login-container {
            width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-radius: 8px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #2173df;
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1259b0;
        }

        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }

        .no-account {
            text-align: center;
            margin-top: 20px;
        }

        .no-account a {
            color: #2173df;
            text-decoration: none;
        }

        .no-account a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div id="portal-login-container">
    <h2>用户登录</h2>

    <div class="form-group">
        <input v-model="email" placeholder="请输入邮箱">
    </div>

    <div class="form-group">
        <input v-model="password" type="password" placeholder="请输入密码">
    </div>

    <button @click="login">登录</button>

    <div class="error" v-if="errorMsg">{{ errorMsg }}</div>

    <div class="no-account">
        <span>没有账号，</span>
        <a href="/index.html">立即浏览</a>
    </div>
</div>

<script type="text/javascript">
    const app = new Vue({
        el: '#portal-login-container',
        data: {
            email: '',
            password: '',
            errorMsg: ''
        },

        methods: {
            login() {
                if (!this.email || !this.password) {
                    this.errorMsg = "请输入邮箱和密码";
                    return;
                }

                axios.post('/user/login', {
                    email: this.email,
                    password: this.password
                }).then(resp => {
                    if (resp.data.code === 1) {
                        // 登录成功，保存登录状态
                        localStorage.setItem('isLoggedIn', true); // 使用localStorage存储登录状态
                        window.location.href = '/index.html'; // 登录成功跳转首页
                    } else {
                        this.errorMsg = resp.data.msg || '邮箱或密码错误';
                    }
                }).catch(err => {
                    this.errorMsg = "服务器错误";
                });
            }
        }
    });
</script>
</body>
</html>
