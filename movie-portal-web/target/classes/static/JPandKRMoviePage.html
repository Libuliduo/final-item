<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <title>日韩剧</title>
    <link rel="stylesheet" type="text/css" href="css/portalCommonStyle.css">
    <link rel="stylesheet" type="text/css" href="css/iframeCommonStyle.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</head>
<body>
<div id="portal-JPandKR-page">
    <div class="box-group">
        <div class="movieBox" v-for="(movie) in movieList">
            <a :href="'/detailPage.html?id=' + movie.id">
                <img :src="movie.posterPath" class="box-img">
                <div class="box-name">{{ movie.title }}</div>
            </a>
        </div>
    </div>
</div>

<script type="text/javascript">
    const app = new Vue({
        el: '#portal-JPandKR-page',
        data: {
            movieList: []
        },
        methods: {},
        created() {
            axios.get("/index/findJPandKR").then(resp => {
                if (resp.data.code == 1) {
                    this.movieList = resp.data.data;
                }
            })
        }
    })
</script>
<script src="/js/verify.js"></script>
</body>
</html>
