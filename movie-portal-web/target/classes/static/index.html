                </svg>
                <div class="leftNav-title">Popcorn</div>

                <!-- 水平无序列表 首页 电影 动漫-->
                <ul class="header-bar-ul">
                    <li><a :class="{ active: currentPage === 'home.html' }" href="javascript:void(0)"
                           @click="changePage('home.html')">首页</a></li>
                    <li><a :class="{ active: currentPage === 'ChineseMoviePage.html' }" href="javascript:void(0)"
                           @click="changePage('ChineseMoviePage.html')">华语剧</a></li>
                    <li><a :class="{ active: currentPage === 'EnglishMoviePage.html' }" href="javascript:void(0)"
                           @click="changePage('EnglishMoviePage.html')">欧美剧</a></li>
                    <li><a :class="{ active: currentPage === 'JPandKRMoviePage.html' }" href="javascript:void(0)"
                           @click="changePage('JPandKRMoviePage.html')">日韩剧</a></li>
                    <li><a :class="{ active: currentPage === 'OtherMoviePage.html' }" href="javascript:void(0)"
                           @click="changePage('OtherMoviePage.html')">其他</a></li>
                    <li><a :class="{ active: currentPage === 'RecommendPage.html' }" href="javascript:void(0)"
                           @click="changePage('RecommendPage.html')">推荐</a></li>
                </ul>
            </div>

            <!-- 用户操作 -->

            <div class="top-user-button">
                <div class="search-box">
                    <i class="el-icon-search"></i>
                    <!-- el-autocomplete 可带输入建议的输入框组件
                        fetch-suggestions: 返回输入建议的方法属性 在你的输入建议数据准备好时通过 cb(data) 返回到 autocomplete 组件中
                        select: 当用户从自动补全建议中选中某一项时，触发的事件
                    -->
                    <el-autocomplete
                            placeholder="搜索"
                            class="inline-input"
                            v-model="searchInput"
                            :trigger-on-focus="false"
                            :fetch-suggestions="querySearch"
                            @select="handleSelect"
                    >
                        <!-- Vue 2.x 插槽语法 -->
                        <template slot-scope="props">
                            <div class="suggestion-item">
                                <div class="target-poster">
                                    <img :src="props.item.posterPath" alt="Movie Poster">
                                </div>
                                <div class="target-info">
                                    <div class="target-title">{{ props.item.title }}</div>
                                    <div class="target-director">{{ props.item.director }}</div>
                                </div>
                            </div>
                        </template>
                    </el-autocomplete>
                </div>
            </div>

            <div class="top-user-button">
                <el-dropdown>
                    <el-button circle>
                        <i class="el-icon-user"></i>
                    </el-button>
                    <el-dropdown-menu slot="dropdown">
                        <el-dropdown-item @click="editInfo">修改信息</el-dropdown-item>
                        <el-dropdown-item @click="logout">退出登录</el-dropdown-item>
                    </el-dropdown-menu>
                </el-dropdown>
            </div>

    <!-- 轮播区域----最新上架 -->
    <div class="banner-wrapper" v-if="isLoggedIn && showBanner">
        <h2>最新上映</h2>
        <el-carousel :interval="4000" type="card" height="400px">
            <el-carousel-item v-for="item in movieBannerList" :key="item.id" class="banner-item">
                <a @click="bannerGoToDetailPage(item.id)" class="banner-link">
                    <img :src="item.posterPath" class="banner-img">
                    <div class="banner-title">{{ item.title }}</div>
                </a>
            </el-carousel-item>
        </el-carousel>
    </div>

    <!-- 内容区域 iframe-->
    <div class="iframe-wrapper">
        <iframe id="main-iframe" :src="iframeSrc" frameborder="0"></iframe>
    </div>
</div>

<script type="text/javascript">
    const app = new Vue({
        el: '#portal-index-page',
        data: {
            iframeSrc: 'home.html',
            currentPage: 'home.html',
            movieBannerList: [],
            movieList: [],
            searchInput: '',
            userId: null,
            isLoggedIn: false,  // 用来保存用户是否已登录
            showBanner: true, // 控制轮播区域是否显示
        },
        methods: {
            // 输入时自动匹配建议
            querySearch(queryString, cb) {
                const results = queryString
                    ? this.movieList.filter(item =>
                        // 匹配电影名或者导演名
                        item.title.toLowerCase().includes(queryString.toLowerCase()) ||
                        item.director.toLowerCase().includes(queryString.toLowerCase())
                    )
                    : [];
                // 直接返回电影对象数组
                cb(results);
                console.log(results);
            },

            // 选中建议项
            handleSelect(item) {
                this.searchInput = item.title;
                this.doSearch(item.id);
            },

            doSearch(movieId) {
                if (!movieId) return;
                // 跳转详情页面
                this.bannerGoToDetailPage(movieId);
            },

            editInfo() {
                console.log(this.searchInput);
                console.log("修改信息触发");
            },

            changePage(pageUrl) {
                this.iframeSrc = pageUrl;
                this.currentPage = pageUrl;
                this.showBanner = true;
                window.scrollTo(0, 0);  // 切换页面时滚动条回顶部
            },
            // 查询首页轮播影视
            findBannerList() {
                axios.get("/banner/findBannerList").then(resp => {
                    if (resp.data.code == 1) {
                        this.movieBannerList = resp.data.data;
                    }
                })
            },
            // 查询所有影视
            findAllList() {
                axios.get("/index/findAll").then(resp => {
                    if (resp.data.code == 1) {
                        this.movieList = resp.data.data;
                    }
                })
            },
            // 切换登录/退出状态
            toggleLogin() {
                if (this.isLoggedIn) {
                    this.logout(); // 如果已登录，执行退出操作
                } else {
                    window.location.href = '/login.html'; // 未登录时跳转到登录页面
                }
            },

            // 执行退出操作
            logout() {
                // 清除登录状态
                this.isLoggedIn = false; // 更新状态
                window.location.href = '/login.html'; // 退出后跳转到登录页面
            },
            bannerGoToDetailPage(movieId) {
                const userId = this.userId;
                if (userId) {
                    // 隐藏banner区域
                    this.showBanner = false;
                    // 将movieId和userId传到详情页
                    this.iframeSrc = `/detailPage.html?id=${movieId}&userId=${userId}`;
                } else {
                    this.$message.warning("请先登录");
                    window.location.href = '/login.html';
                }
            },

        },
        created() {
            console.log(this.userId)
            // 登录进来 从sessionStorage获取token 解析用户id
            const token = sessionStorage.getItem("Authorization");

            if (token) {
                // 获取用户id
                axios.get("/user/jwtUserId", {
                    headers: {Authorization: token}
                }).then(resp => {
                    const userId = resp.data.data;
                    this.userId = userId;
                    console.log("用户ID：", userId);

                    // 存储到sessionStorage中
                    sessionStorage.setItem("userId", userId);
                    this.isLoggedIn = true;
                }).catch(err => {
                    console.error("获取用户ID失败：", err);
                    this.$message.error("登录状态已失效，请重新登录！");
                });
            } else {
                this.$message.warning("请先登录！");
            }
            // 查询轮播电影
            this.findBannerList();
            // 查询全部电影，用于搜索
            this.findAllList();
        }
    })

    // 让iframe可以设定父元素
    window.app = app;

    window.addEventListener('DOMContentLoaded', function () {
        const iframe = document.getElementById('main-iframe');

        function resizeIframe() {
            try {
                const iframeDoc = iframe.contentWindow.document;
                const body = iframeDoc.body;
                const html = iframeDoc.documentElement;
                // 综合body和html高度，取最大值，防止误差
                const scrollHeight = Math.max(body.scrollHeight, html.scrollHeight);
                iframe.style.height = (scrollHeight + 10) + 'px'; // 多留10px缓冲
            } catch (error) {
                console.error('设置iframe高度失败，可能是跨域问题');
            }
        }

        iframe.addEventListener('load', function () {
            resizeIframe(); // iframe加载完第一次调整

            // 设置定时器，动态监听内容高度变化
            let totalTime = 0;
            const interval = setInterval(() => {
                resizeIframe();
                totalTime += 500;
                if (totalTime > 5000) { // 最多调整5秒
                    clearInterval(interval);
                }
            }, 500);
        });
    });
</script>
