            flex-direction: column;
            row-gap: 20px;

            </svg>
            <div class="leftNav-title">Popcorn</div>
            <!-- 水平无序列表 首页 电影 动漫-->
            <ul class="header-bar-ul">
                <li><a href="./index.html" target="iframe-content">首页</a></li>
                <li><a href="javascript:void(0)" target="iframe-content">电影</a></li>
                <li><a href="javascript:void(0)" target="iframe-content">动漫</a></li>
                <li><a href="javascript:void(0)" target="iframe-content">美剧</a></li>
                <li><a href="javascript:void(0)" target="iframe-content">日韩</a></li>
            </ul>
        </div>
        <!-- 右侧 切换主题颜色、搜索等按钮-->
        <div class="right-buttons">
            <button id="theme-switch">
                <svg xmlns="http://www.w3.org/2000/svg" height="40px" viewBox="0 -960 960 960" width="40px"
                     fill="#e3e3e3">
                    <path d="M480-280q-83 0-141.5-58.5T280-480q0-83 58.5-141.5T480-680q83 0 141.5 58.5T680-480q0 83-58.5 141.5T480-280ZM200-446.67H40v-66.66h160v66.66Zm720 0H760v-66.66h160v66.66ZM446.67-760v-160h66.66v160h-66.66Zm0 720v-160h66.66v160h-66.66ZM260-655.33l-100.33-97 47.66-49 96 100-43.33 46Zm493.33 496-97.66-100.34 45-45.66 99.66 97.66-47 48.34Zm-98.66-541.34 97.66-99.66 49 47L702-656l-47.33-44.67ZM159.33-207.33 259-305l46.33 45.67-97.66 99.66-48.34-47.66Z"/>

                <svg xmlns="http://www.w3.org/2000/svg" height="40px" viewBox="0 -960 960 960" width="40px"
                     fill="#e3e3e3">
                    <path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q10 0 20.5.67 10.5.66 24.17 2-37.67 31-59.17 77.83T444-660q0 90 63 153t153 63q53 0 99.67-20.5 46.66-20.5 77.66-56.17 1.34 12.34 2 21.84.67 9.5.67 18.83 0 150-105 255T480-120Z"/>

            </button>
        </div>
    </div>

    <!-- 内容区 -->
    <div class="movie-detail">
        <!-- 背景封面 和 影视名称 -->
        <img class="detailImg" :src="movie.backdropPath" alt="图片显示失败">
        <h1 class="title">{{ movie.title }}</h1>

        <!-- 电影详情 -->
        <div class="sub-info">
            <span class="popularity" style="color: #ff9900">{{ movie.popularity }}</span>
            <span> / </span>
            <span class="year">{{ movie.releaseDate.substring(0, 4) }}</span>
            <span> / </span>
            <span class="genres">{{ movie.genres.join(' ') }}</span>
            <span> / </span>
            <span class="country">{{ movie.country }}</span>
        </div>
        <div>
            <span>导演：</span>
            <span>{{ movie.director }}</span>
        </div>
        <div>
            <span>演员：</span>
            <span>{{ movie.actors }}</span>
        </div>
        <div class="buttons">
            <el-button type="primary" icon="el-icon-video-play" @click="goToSinglePage(movie.url)">播放</el-button>
            <el-button
                    :icon="isFavorite ? 'el-icon-star-on' : 'el-icon-star-off'"
                    type="warning"
                    @click="toggleFavorite">
                {{ isFavorite ? '已收藏' : '收藏' }}
            </el-button>
            <el-button icon="el-icon-check">看过</el-button>
        </div>
        <p class="overview">{{ movie.overview }}</p>
    </div>
</div>

<script type="text/javascript">
    const app = new Vue({
        el: '#portal-index-page',
        data: {
            userId: 1,
            movieId: 1,
            isFavorite: false,
            movie: {
                "id": 27,
                "title": "三傻大闹宝莱坞",
                "originalTitle": "3 Idiots",
                "genres": [
                    "剧情",
                    "喜剧"
                ],
                "country": "IN",
                "releaseDate": "2009-12-23",
                "overview": "本片根据印度畅销书作家奇坦·巴哈特（Chetan Bhagat）的处女作小说《五点人》（Five Point Someone）改编而成。法兰、拉杜与兰乔是皇家工程学院的学生，三人共居一室，结为好友。在以严格著称的学院里，兰乔是个非常与众不同的学生，他不死记硬背，甚至还公然顶撞校长“病毒”，质疑他的教学方法。他不仅鼓动法兰与拉杜去勇敢追寻理想，还劝说校长的二女儿碧雅离开满眼铜臭的未婚夫。兰乔的特立独行引起了模范学生“消音器”的不满，他约定十年后再与兰乔一决高下，看哪种生活方式更能取得成功。本片获孟买电影博览奖最佳影片、最佳导演、最佳配角（波曼·伊拉尼）、最佳剧本等六项大奖，并获国际印度电影协会最佳影片、最佳导演、最佳剧情、最佳摄影等十六项大奖。",
                "director": "拉吉库马尔·希拉尼",
                "actors": "阿米尔·汗, 马达范 R, 沙尔曼·乔什, 卡琳娜·卡普, 博曼·伊拉尼",
                "backdropPath": "https://image.tmdb.org/t/p/w500/e0PVYBaGdKLtvyIp2uEUzT1JUO7.jpg",
                "posterPath": "https://image.tmdb.org/t/p/w500/qEVZeu6ODIpS3zwyhOxKEmvkDpH.jpg",
                "url": "https://alist.yeyuchun.top:23333/p/NASVideo/%E5%8A%9F%E5%A4%AB/%E5%8A%9F~%E5%A4%AB4K120%E5%B8%A7%E7%B2%A4%E8%AF%AD.mp4?sign=FyfAV24tapK1Txdfc3wJVzaWAz4MYSOpL1yBPyWCcpw=:0",
                "popularity": 12.5
            },
        },
        methods: {
            // 进入界面时调用该方法，通过id获取该movie信息
            findMovieById(id) {
                axios.get("/index/findMovieById?id=" + id).then(resp => {
                    if(resp.data.code == 1) {
                        this.movie = resp.data.data;
                    }
                })
            },


            goToSinglePage(url) {
                const encodedUrl = encodeURIComponent(url);
                window.location.href = `/singlePage.html?url=${encodedUrl}`;
            },

            checkFavorite() {
                axios.get("/user/isFavorite", {
                    params: {
                        userId: this.userId,
                        movieId: this.movieId
                    }
                }).then(resp => {
                    this.isFavorite = resp.data.data;
                }).catch(err => {
                    console.error("获取收藏状态失败：", err);
                    this.$message.error("获取收藏状态失败，请重试！");
                });
            },

            toggleFavorite() {
                const url = this.isFavorite ? '/user/remove' : '/user/add';
                axios.post(url, null, {
                    params: {
                        userId: this.userId,
                        movieId: this.movieId
                    }
                }).then(resp => {
                    this.isFavorite = !this.isFavorite;
                    this.$message.success(this.isFavorite ? "收藏成功！" : "已取消收藏！");
                }).catch(err => {
                    console.error("操作失败：", err);
                    this.$message.error("操作失败，请重试！");
                });
            }


        },
        created() {
            const params = new URLSearchParams(location.search);
            this.movieId = params.get('id');
            this.userId = params.get('userId');

            console.log("电影ID：", this.movieId);
            console.log("用户ID：", this.userId);

            if (this.movieId && this.userId) {
                this.findMovieById(this.movieId); //获取影视详情
                this.checkFavorite(); // 获取收藏状态
            } else {
                this.$message.warning("用户信息或电影信息丢失，请重新登录");
                window.location.href = 'login.html';
            }
        }
    })
</script>
</body>

</html>
